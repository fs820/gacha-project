<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>管理画面</h1>
    
    <div class="tabs">
        <button name="banner">バナー追加</button>
        <button name="change">バナー編集</button>
        <button name="character">キャラクター追加</button>
        <button name="constant">恒常変更</button>
        <button name="pickup">ピックアップ変更</button>
        <button name="stone">石の付与</button>
        <button name="history">ガチャ履歴削除</button>
    </div>

    <div id="banner" class="page">
        <h3>バナー追加</h3>
        <form id="insert_banner">
            <div>
                <label>タイトル</label>
                <input type="text" name="title">
            </div>
            <div>
                <label>消費石</label>
                <input type="number" name="cost">
            </div>
            <div>
                <label>星5確率(/1000)</label>
                <input type="number" name="probBaseStar5">
            </div>
            <div>
                <label>星4確率(/1000)</label>
                <input type="number" name="probBaseStar4">
            </div>
            <div>
                <label>星5天井</label>
                <input type="number" name="star5Limit">
            </div>
            <div>
                <label>星4天井</label>
                <input type="number" name="star4Limit">
            </div>
            <div>
                <label>星5のうちピックアップの確率</label>
                <input type="number" name="star5PickupProb">
            </div>
            <div>
                <label>確率が上昇し始める回数</label>
                <input type="number" name="pitySoftStart">
            </div>
            <div>
                <label>確率の上昇具合</label>
                <input type="number" name="softPityIncrement">
            </div>
        </form>
        <button id="insertBannerSubmitButton">追加</button>
    </div>

    <div id="change" class="page" style="display:none;">
        <h3>バナー編集</h3>
        <form id="change_banner">
        </form>
        <button id="changeBannerSubmitButton">追加</button>
    </div>

    <div id="character" class="page" style="display:none;">
        <h3>キャラクター追加</h3>
        <input type="text" id="charName" placeholder="キャラクター名">
        <select id="charRarity">
            <option value="星3">星3</option>
            <option value="星4">星4</option>
            <option value="星5">星5</option>
        </select>
        <br><br>
        <button id="insertCharacterSubmitButton">更新</button>
    </div>

    <div id="constant" class="page" style="display:none;">
        <h3>恒常変更</h3>
        <div id="checkboxContainer_constant"></div>
        <button id="constantSubmitButton">決定</button>
    </div>

    <div id="pickup" class="page" style="display:none;">
        <h3>ピックアップ変更</h3>
        <div id="pulldownContainer_banner"></div>
        <div id="checkboxContainer_star5"></div>
        <div id="checkboxContainer_star4"></div>
        <button id="pickupSubmitButton">決定</button>
    </div>

    <div id="stone" class="page" style="display:none;">
        <h3>石の付与</h3>
        <input type="text" id="uid" placeholder="ユーザーID">
        <input type="number" id="amount" placeholder="付与する石の数">
        <br><br>
        <button id="addStoneSubmitButton">付与</button>
    </div>

    <div id="history" class="page" style="display:none;">
        <h3>ガチャ履歴の削除</h3>
        <button id="deleteHistorySubmitButton">削除</button>
    </div>

    <script type="module" src="dist/script.js?v=20260716"></script>
</body>
</html>
